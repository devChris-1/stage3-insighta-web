<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login – Insighta Labs+</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: system-ui, sans-serif;
        background: #1a1a2e;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .card {
        background: white;
        border-radius: 12px;
        padding: 3rem 2.5rem;
        text-align: center;
        width: 360px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      }
      h1 {
        font-size: 1.6rem;
        margin-bottom: 0.5rem;
      }
      p {
        color: #666;
        margin-bottom: 2rem;
        font-size: 0.95rem;
      }
      a.btn {
        display: block;
        background: #24292e;
        color: white;
        padding: 0.85rem;
        border-radius: 8px;
        text-decoration: none;
        font-size: 1rem;
        font-weight: 500;
      }
      a.btn:hover {
        background: #444;
      }
      .logo {
        font-size: 2rem;
        margin-bottom: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">🔬</div>
      <h1>Insighta Labs+</h1>
      <p>Demographic Intelligence Platform</p>
      <a href="/auth/github" class="btn">Continue with GitHub</a>
    </div>
  </body>
</html>
