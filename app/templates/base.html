<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Insighta Labs+</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
        color: #333;
      }
      nav {
        background: #1a1a2e;
        color: white;
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      nav a {
        color: #ccc;
        text-decoration: none;
        margin-left: 1.5rem;
      }
      nav a:hover {
        color: white;
      }
      nav .brand {
        font-weight: bold;
        font-size: 1.2rem;
        color: white;
      }
      .container {
        max-width: 1100px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      .card {
        background: white;
        border-radius: 8px;
        padding: 1.5rem;
        margin-bottom: 1rem;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        padding: 0.75rem 1rem;
        text-align: left;
        border-bottom: 1px solid #eee;
        font-size: 0.9rem;
      }
      th {
        background: #f9f9f9;
        font-weight: 600;
      }
      tr:hover {
        background: #fafafa;
      }
      .btn {
        display: inline-block;
        padding: 0.5rem 1.2rem;
        border-radius: 6px;
        border: none;
        cursor: pointer;
        font-size: 0.9rem;
        text-decoration: none;
      }
      .btn-primary {
        background: #1a1a2e;
        color: white;
      }
      .btn-danger {
        background: #e74c3c;
        color: white;
      }
      .btn-sm {
        padding: 0.3rem 0.8rem;
        font-size: 0.8rem;
      }
      input,
      select {
        padding: 0.5rem 0.8rem;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 0.9rem;
      }
      .filters {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
        margin-bottom: 1.5rem;
        align-items: flex-end;
      }
      .badge {
        display: inline-block;
        padding: 0.2rem 0.6rem;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 600;
      }
      .badge-admin {
        background: #ffeaa7;
        color: #856404;
      }
      .badge-analyst {
        background: #d1ecf1;
        color: #0c5460;
      }
      .pagination {
        display: flex;
        gap: 0.5rem;
        margin-top: 1rem;
        align-items: center;
      }
      .pagination a {
        padding: 0.4rem 0.8rem;
        border: 1px solid #ddd;
        border-radius: 4px;
        text-decoration: none;
        color: #333;
        font-size: 0.85rem;
      }
      .pagination a:hover {
        background: #f0f0f0;
      }
      .stat-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1rem;
        margin-bottom: 1.5rem;
      }
      .stat-card {
        background: white;
        border-radius: 8px;
        padding: 1.5rem;
        text-align: center;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
      }
      .stat-card .number {
        font-size: 2rem;
        font-weight: bold;
        color: #1a1a2e;
      }
      .stat-card .label {
        color: #888;
        font-size: 0.85rem;
        margin-top: 0.3rem;
      }
    </style>
  </head>
  <body>
    <nav>
      <span class="brand">Insighta Labs+</span>
      <div>
        <a href="/">Dashboard</a>
        <a href="/profiles">Profiles</a>
        <a href="/search">Search</a>
        <a href="/account">Account</a>
        <a href="/logout" style="color: #e74c3c">Logout</a>
      </div>
    </nav>
    <div class="container">{% block content %}{% endblock %}</div>
  </body>
</html>
